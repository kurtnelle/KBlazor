name: Publish to NuGet

on:
  push:
    branches: [main]
    paths:
      - 'KBlazor/**'
      - '.github/workflows/nuget-publish.yml'
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Read package version
        id: version
        run: |
          VERSION=$(grep -oPm1 '(?<=<Version>)[^<]+' KBlazor/KBlazor.csproj)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Detected KBlazor version: $VERSION"

      - name: Restore
        run: dotnet restore KBlazor/KBlazor.csproj

      - name: Pack
        run: dotnet pack KBlazor/KBlazor.csproj -c Release -o ./nupkgs --no-restore

      - name: Push to NuGet
        run: |
          dotnet nuget push "./nupkgs/KBlazor.${{ steps.version.outputs.version }}.nupkg" \
            --api-key "${{ secrets.NUGET_API_KEY }}" \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ steps.version.outputs.version }}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists; uploading assets with --clobber."
            gh release upload "$TAG" ./nupkgs/*.nupkg ./nupkgs/*.snupkg --clobber || \
              gh release upload "$TAG" ./nupkgs/*.nupkg --clobber
          else
            gh release create "$TAG" \
              --target "${{ github.sha }}" \
              --title "$TAG" \
              --generate-notes \
              ./nupkgs/*.nupkg
          fi
